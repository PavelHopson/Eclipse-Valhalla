<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>Eclipse Valhalla</title>
    <link rel="manifest" href="/manifest.json">
    <!-- Tailwind CSS bundled via PostCSS (no CDN dependency) -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      :root {
        --ev-bg: #0A0A0A;
        --ev-surface: #121212;
        --ev-card: #171717;
        --ev-text: #F2F1EE;
        --ev-muted: #B4B0A7;
        --ev-ghost: #5F5A54;
        --ev-blue: #6C8FB8;
        --ev-red: #7A1F24;
        --ev-gold: #B89B5E;
      }

      body {
        font-family: 'Manrope', 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at top, rgba(108, 143, 184, 0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(184, 155, 94, 0.04), transparent 26%),
          #0A0A0A;
        color: #F2F1EE;
        overscroll-behavior-y: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      h1, h2, h3, .brand-font { font-family: 'Cinzel', Georgia, serif; font-weight: 700; letter-spacing: 0.02em; }
      h4, h5, h6, .font-body-display { font-family: 'Manrope', 'Segoe UI', sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
      .font-ritual { font-family: 'Cinzel', Georgia, serif; }

      /* Scrollbar — minimal dark */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #343434; }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Safe Areas */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }

      /* Subtle noise texture overlay */
      .noise-overlay::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.025;
        pointer-events: none;
        z-index: 9999;
        background-image:
          linear-gradient(90deg, transparent 0 3%, rgba(255,255,255,0.01) 3.1%, transparent 3.2%),
          url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      }

      .noise-overlay::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.1;
        background-image:
          radial-gradient(circle at center, transparent 0 58%, rgba(108,143,184,0.09) 58.2%, transparent 58.6%),
          linear-gradient(180deg, rgba(255,255,255,0.03), transparent 25%);
      }

      /* Glow keyframes */
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      /* Selection */
      ::selection {
        background-color: #6C8FB840;
        color: #F2F1EE;
      }

      /* ══ RITUAL MOTION SYSTEM ══ */

      /* State: Active quest — cold inner light */
      @keyframes state-active {
        0%, 100% { box-shadow: inset 0 0 16px rgba(108,143,184,0.02), 0 0 0 1px rgba(108,143,184,0.07); }
        50% { box-shadow: inset 0 0 24px rgba(108,143,184,0.05), 0 0 0 1px rgba(108,143,184,0.11); }
      }
      .state-active { animation: state-active 4s ease-in-out infinite; }

      /* State: Overdue — heartbeat blood glow */
      @keyframes state-overdue {
        0%, 100% { box-shadow: inset 0 0 12px rgba(122,31,36,0.04), 0 0 0 1px rgba(122,31,36,0.08); }
        50% { box-shadow: inset 0 0 22px rgba(122,31,36,0.07), 0 0 0 1px rgba(122,31,36,0.16); }
      }
      .state-overdue { animation: state-overdue 3.1s ease-in-out infinite; }

      /* State: Completed — dissolve into void */
      @keyframes state-complete {
        0% { opacity: 1; transform: scale(1); }
        40% { opacity: 1; transform: scale(1.015); }
        100% { opacity: 0; transform: scale(0.97); filter: blur(2px); }
      }
      .state-complete { animation: state-complete 600ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }

      /* Impact: Done button press */
      @keyframes impact-done {
        0% { transform: scale(1); }
        15% { transform: scale(0.96); }
        40% { transform: scale(1.03); box-shadow: 0 0 30px rgba(184,155,94,0.15); }
        100% { transform: scale(1); box-shadow: none; }
      }
      .impact-done { animation: impact-done 400ms cubic-bezier(0.34, 1.56, 0.64, 1); }

      /* Seal: ritual draw animation */
      @keyframes seal-draw {
        0% { opacity: 0; transform: scale(0.8) rotate(-10deg); }
        40% { opacity: 0.5; transform: scale(1.05) rotate(0deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      .seal-enter { animation: seal-draw 800ms cubic-bezier(0.16, 1, 0.3, 1); }

      /* Focus: Ritual entrance — descend into void */
      @keyframes ritual-enter {
        0% { opacity: 0; backdrop-filter: blur(0); }
        30% { opacity: 0.5; }
        100% { opacity: 1; backdrop-filter: blur(4px); }
      }
      .ritual-enter { animation: ritual-enter 800ms cubic-bezier(0.16, 1, 0.3, 1); }

      /* Focus: Timer ring pulse */
      @keyframes ring-pulse {
        0%, 100% { filter: drop-shadow(0 0 3px rgba(108,143,184,0.08)); }
        50% { filter: drop-shadow(0 0 10px rgba(108,143,184,0.18)); }
      }
      .ring-pulse { animation: ring-pulse 4.2s ease-in-out infinite; }

      /* Return: Judgment descend */
      @keyframes judgment-enter {
        0% { opacity: 0; transform: translateY(-20px) scale(0.985); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .judgment-enter { animation: judgment-enter 600ms cubic-bezier(0.16, 1, 0.3, 1); }

      /* Micro: System idle — barely perceptible */
      @keyframes system-idle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.97; }
      }
      .system-idle { animation: system-idle 8s ease-in-out infinite; }

      @keyframes sigil-drift {
        0%, 100% { transform: translateY(0); opacity: 0.16; }
        50% { transform: translateY(-4px); opacity: 0.22; }
      }
      .sigil-drift { animation: sigil-drift 12s ease-in-out infinite; }

      /* Legacy compat */
      .animate-eclipse-pulse { animation: state-active 4s ease-in-out infinite; }
      .animate-quest-complete { animation: state-complete 600ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }
      .animate-critical-glow { animation: state-overdue 2.5s ease-in-out infinite; }

      /* Input color scheme for date/time inputs */
      input[type="datetime-local"],
      input[type="date"],
      input[type="time"] {
        color-scheme: dark;
      }
      select {
        color-scheme: dark;
      }

      /* Workout animations */
      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 0.2; }
        100% { transform: scale(1); opacity: 0.6; }
      }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        14% { transform: scale(1.06); }
        28% { transform: scale(1); }
        42% { transform: scale(1.04); }
        56% { transform: scale(1); }
      }
      @keyframes progress-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(93,174,255,0.3); }
        50% { box-shadow: 0 0 20px rgba(93,174,255,0.6); }
      }
      @keyframes slide-up-fade {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes count-pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
      }
      @keyframes shimmer-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .workout-card-enter { animation: slide-up-fade 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
      .workout-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }
      .workout-pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
      .workout-progress-glow { animation: progress-glow 2s ease-in-out infinite; }
      .workout-count-pop { animation: count-pop 0.3s ease-out; }
      .workout-shimmer { position: relative; overflow: hidden; }
      .workout-shimmer::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
        animation: shimmer-slide 3s ease-in-out infinite;
      }
      @keyframes confetti-fall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
    </style>
  </head>
  <body class="noise-overlay">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Force dark mode
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';

        // Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered:', reg))
              .catch(err => console.log('SW failed:', err));
          });
        }
    </script>
  </body>
</html>
