<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>Eclipse Valhalla</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Cinzel:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background-color: #050508;
        color: #EAEAF2;
        overscroll-behavior-y: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      h1, h2, h3, .brand-font { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
      .font-mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
      .font-handwriting { font-family: 'Patrick Hand', cursive; }

      /* Scrollbar — minimal dark */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2A2A3C; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3A3A52; }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Safe Areas */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }

      /* Subtle noise texture overlay */
      .noise-overlay::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.015;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      }

      /* Glow keyframes */
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      /* Selection */
      ::selection {
        background-color: #5DAEFF30;
        color: #E8E8F0;
      }

      /* ══ RITUAL MOTION SYSTEM ══ */

      /* State: Active quest — cold inner light */
      @keyframes state-active {
        0%, 100% { box-shadow: inset 0 0 20px rgba(93,168,255,0.03), 0 0 0 1px rgba(93,168,255,0.06); }
        50% { box-shadow: inset 0 0 30px rgba(93,168,255,0.06), 0 0 0 1px rgba(93,168,255,0.10); }
      }
      .state-active { animation: state-active 4s ease-in-out infinite; }

      /* State: Overdue — heartbeat blood glow */
      @keyframes state-overdue {
        0%, 100% { box-shadow: inset 0 0 15px rgba(224,48,48,0.04), 0 0 0 1px rgba(224,48,48,0.08); }
        50% { box-shadow: inset 0 0 25px rgba(224,48,48,0.08), 0 0 0 1px rgba(224,48,48,0.15); }
      }
      .state-overdue { animation: state-overdue 2.5s ease-in-out infinite; }

      /* State: Completed — dissolve into void */
      @keyframes state-complete {
        0% { opacity: 1; transform: scale(1); }
        40% { opacity: 1; transform: scale(1.015); }
        100% { opacity: 0; transform: scale(0.97); filter: blur(2px); }
      }
      .state-complete { animation: state-complete 600ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }

      /* Impact: Done button press */
      @keyframes impact-done {
        0% { transform: scale(1); }
        15% { transform: scale(0.96); }
        40% { transform: scale(1.03); box-shadow: 0 0 30px rgba(61,214,140,0.15); }
        100% { transform: scale(1); box-shadow: none; }
      }
      .impact-done { animation: impact-done 400ms cubic-bezier(0.34, 1.56, 0.64, 1); }

      /* Focus: Ritual entrance — descend into void */
      @keyframes ritual-enter {
        0% { opacity: 0; backdrop-filter: blur(0); }
        30% { opacity: 0.5; }
        100% { opacity: 1; backdrop-filter: blur(4px); }
      }
      .ritual-enter { animation: ritual-enter 800ms cubic-bezier(0.16, 1, 0.3, 1); }

      /* Focus: Timer ring pulse */
      @keyframes ring-pulse {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(93,168,255,0.1)); }
        50% { filter: drop-shadow(0 0 12px rgba(93,168,255,0.2)); }
      }
      .ring-pulse { animation: ring-pulse 3s ease-in-out infinite; }

      /* Return: Judgment descend */
      @keyframes judgment-enter {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .judgment-enter { animation: judgment-enter 600ms cubic-bezier(0.16, 1, 0.3, 1); }

      /* Micro: System idle — barely perceptible */
      @keyframes system-idle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.97; }
      }
      .system-idle { animation: system-idle 8s ease-in-out infinite; }

      /* Legacy compat */
      .animate-eclipse-pulse { animation: state-active 4s ease-in-out infinite; }
      .animate-quest-complete { animation: state-complete 600ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }
      .animate-critical-glow { animation: state-overdue 2.5s ease-in-out infinite; }

      /* Input color scheme for date/time inputs */
      input[type="datetime-local"],
      input[type="date"],
      input[type="time"] {
        color-scheme: dark;
      }
      select {
        color-scheme: dark;
      }
    </style>
  </head>
  <body class="noise-overlay">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Force dark mode
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';

        // Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered:', reg))
              .catch(err => console.log('SW failed:', err));
          });
        }
    </script>
  </body>
</html>
