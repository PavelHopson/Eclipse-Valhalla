name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths:
      - 'package.json'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release-meta.outputs.should_release }}
      release_tag: ${{ steps.release-meta.outputs.release_tag }}
      app_version: ${{ steps.release-meta.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: release-meta
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${APP_VERSION}"
          SHOULD_RELEASE="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            APP_VERSION="${RELEASE_TAG#v}"
            SHOULD_RELEASE="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            SHOULD_RELEASE="true"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD^:package.json | node -p "const fs=require('fs'); const data=fs.readFileSync(0,'utf8'); JSON.parse(data).version")
            if [[ "${PREV_VERSION}" != "${APP_VERSION}" ]]; then
              SHOULD_RELEASE="true"
            fi
          else
            SHOULD_RELEASE="true"
          fi

          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build

      - name: Build Electron (${{ matrix.target }})
        shell: bash
        run: npx electron-builder --${{ matrix.target }} --config.forceCodeSigning=false --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.yml

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Eclipse Valhalla ${{ needs.prepare.outputs.app_version }}
          generate_release_notes: true
          files: artifacts/**/*
