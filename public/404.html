<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Eclipse Valhalla</title>
  <script>
    // SPA redirect for GitHub Pages
    var path = window.location.pathname;
    var repo = '/Eclipse-Valhalla';
    if (path.startsWith(repo)) {
      sessionStorage.setItem('redirect', path.slice(repo.length));
    }
    window.location.replace(repo + '/');
  </script>
</head>
<body></body>
</html>
